name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: deliver
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deliver"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CRON_SECRET: ci
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deliver?schema=public
      GEO_PROVIDER: dev
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_TWOGIS_MAP_KEY: ""
      OTP_PROVIDER: dev
      PRISMA_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deliver?schema=public
      TWOGIS_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Apply migrations
        run: npm run db:migrate:deploy

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
